samples:
    short: Sample integrations built by Stripe
sandbox:
    claim:
        flags:
            non_interactive: Print output directly without waiting for input
        long: Opens the claim URL for your active sandbox. After claiming, run `stripe login` to get permanent keys.
        output:
            claim_with_account: |
                Claim your sandbox ({account_id}) by visiting the claim link below.
            claim_without_account: |
                Claim your sandbox by visiting the claim link below.
            no_active_sandbox: |
                No active sandbox. Run `stripe sandbox create` to get started.
            press_enter_to_open: Press Enter to open the browser or visit {url}
            session_expired: |
                Your sandbox session has expired.
                Run `stripe login` to continue with a claimed sandbox, or run `stripe sandbox create` again to create a new one.
            visit_url: |
                Visit {url}
        short: Claim your sandbox in the browser
    create:
        errors:
            browser_unavailable: browser login unavailable in SSH session
            email_required: email is required, pass --email your@email.com or use --from-git to infer from git config user.email
            git_email_not_set: --from-git requires git config user.email to be set, but it was not found
            invalid_email: 'invalid email "{email}": {error}'
            mutually_exclusive: --email and --from-git are mutually exclusive
            no_secret_key: no secret key in server response
        example: |-
            stripe sandbox create --email you@example.com
              stripe sandbox create --from-git
        flags:
            email: Your email address
            from_git: Infer email and full name from git config
            full_name: Your full name (optional)
            non_interactive: Print output directly without waiting for input
        long: |
            Create a new Stripe sandbox with test API keys.

            If you are already logged in (have a configured API key), opens the
            sandbox management page in your browser instead.

            Otherwise, uses a proof-of-work challenge to provision a temporary sandbox
            without authentication. If that fails, automatically falls back to
            browser-based signup/login.

            Keys are saved to the current CLI profile so subsequent stripe commands
            work immediately.
        output:
            active_sandbox_account_id: |
                Account ID:      {id}
            active_sandbox_claim_hint: |4
                Run `stripe sandbox claim` when you're ready to claim your sandbox.
            active_sandbox_expires: |4
                This sandbox expires {date} (in 7 days). Claim it before then by running `stripe sandbox claim`.
            active_sandbox_header: |+
                You already have an active sandbox.

            active_sandbox_pub_key: |
                Publishable key: {key}
            active_sandbox_secret_key: |
                Secret key:      {key}
            already_authenticated: |+
                You're already authenticated; sandbox management is available in Dashboard.

            done: ' done.'
            press_enter_to_open: Press Enter to open the browser or visit {url}
            provisioning_failed: |4-
                Could not provision a sandbox automatically. Opening browser to create your Stripe sandbox account instead...
            sandbox_claim_hint: |4
                Claim your sandbox by using the above claim_url or running `stripe sandbox claim`.
            sandbox_expires: |4
                This sandbox expires {date} (in 7 days). Claim it before then by using the above claim_url or running `stripe sandbox claim`.
            session_expired: |
                Your sandbox session has expired.
                Run `stripe login` to continue with a claimed sandbox, or run `stripe sandbox create` again to create a new one.
            setting_up: Setting up your sandbox...
            ssh_no_browser: SSH session detected. Cannot open browser.
            ssh_use_interactive: Use `stripe login --interactive` or set STRIPE_API_KEY instead.
            use_keys_hint: |4
                Use the keys above to start building your integration.
            using_email_from_git: |
                Using email: {email} (from git config)
            visit_url: |
                Visit {url}
        short: Provision a new sandbox environment
    short: Manage Stripe sandbox environments
