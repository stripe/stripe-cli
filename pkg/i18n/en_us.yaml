        stripe {preview}post /payment_intents \
            -d amount=2000 \
            -d currency=usd \
            -d "payment_method_types[]=card"
    long: |
        Make {verb} requests to the Stripe API using your test mode key.

        The post command supports API features like idempotency keys and expand flags.
        {preview_note}
        For a full list of supported paths, see the API reference:
        https://stripe.com/docs/api
    preview_note: |4
        The preview Stripe-Version header is set automatically on all requests.
    short: Make a {verb} request to the Stripe API
postinstall:
    example: stripe postinstall
    output:
        welcome: Thanks for installing the Stripe CLI! To get started, run `stripe login`
    short: Run some checks after installation of this CLI and prompt user if needed
