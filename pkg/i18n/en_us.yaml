        forward_connect_url_relative: forward_connect_to cannot be a relative path when loading webhook endpoints from the API
        forward_url_cannot_parse: 'provided forward url cannot be parsed: {url}'
        forward_url_relative: forward_to cannot be a relative path when loading webhook endpoints from the API
        load_from_webhooks_requires_forward: load_from_webhooks_api requires a location to forward to with forward_to
        malformed_event: 'Received malformed event: {error}'
        malformed_event_internal: received malformed event from Stripe
        no_webhook_endpoints: 'you have not defined any webhook endpoints on your account, go to the Stripe Dashboard to add some: https://dashboard.stripe.com/test/webhooks'
        session_expired: session expired, terminating after {attempts} failed attempts to reauthorize
        too_many_sessions: you have too many `stripe listen` sessions open, please close some and try again
        unrecognized_format: |
            Unrecognized output format {format}
    output:
        api_version: 'You are using Stripe API Version [{version}]. '
    warnings:
