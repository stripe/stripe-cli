            We'd love to know what you think of the CLI:

            * Report bugs or issues on GitHub: https://github.com/stripe/stripe-cli/issues
    short: Provide us with feedback on the CLI
fixtures:
    flags:
        add: Add parameters in the fixture
        api_version: Specify API version in the fixture
        edit: Edit the fixture directly in your default IDE
        override: Override parameters in the fixture
        remove: Remove parameters from the fixture
