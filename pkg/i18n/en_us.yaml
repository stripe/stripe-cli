        api_key_expired_profile: The API key for profile "{profile}" has expired. Run `stripe login --project-name={profile}` to re-authenticate.
        auto_login_prompt: |
            {error}. Running `stripe login`...
        color_flag_no_command: You provided the "--color" flag but did not specify any command. The "--color" flag configures the color output of a specified command.
        did_you_mean: |4-
             Did you mean "{suggestion}"?
            If not, s
        no_api_key_hint_browser: '  To start a browser login (requires user action): run `stripe login` and follow the printed instructions.'
        no_api_key_hint_key: '  If you have an API key: set STRIPE_API_KEY or pass --api-key <key>.'
        project_not_found: |
            You provided the project name "{project}" (either via the "--project-name" flag or the "STRIPE_PROJECT_NAME" environment variable), but no config for that project was found.
            Please run `stripe login --project-name={project}` to enable commands for this project.
        unknown_command: Unknown command "{command}" for "{parent}".{suggestion_str}ee "stripe --help" for a list of available commands.
        unknown_command_tree: |+
            Unknown command {command} — showing full command tree.

