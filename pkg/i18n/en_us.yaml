            * is only supported in the CLI, thin event destinations do not support selecting all event types
requests:
    errors:
        too_many_args: this command only supports one argument. Run with the --help flag to see usage and examples
        unrecognized_id: 'unrecognized object id: {id}'
    flags:
        confirm: Skip the warning prompt and automatically confirm the command being entered
        dark_style: Use a darker color scheme better suited for lighter command-lines
        data: Data for the API request
        dry_run: Preview the request without sending it
        ending_before: Retrieve the previous page in the list. This is a cursor for pagination and should be an object ID
        expand: Response attributes to expand inline
        idempotency: Set the idempotency key for the request, prevents replaying the same requests within 24 hours
        limit: How many objects to be returned, between 1 and 100 (default is 10)
        live: 'Make a live request (default: test)'
        show_headers: Show response headers
        starting_after: Retrieve the next page in the list. This is a cursor for pagination and should be an object ID
        stripe_account: Set a header identifying the connected account
        stripe_context: Set a header identifying the compartment context
        stripe_version: Set the Stripe API version to use for your request
    output:
