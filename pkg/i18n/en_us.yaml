    short: Run fixtures to populate your account with data
get:
    example: |-
        stripe {preview}get ch_1EGYgUByst5pquEtjb0EkYha
          stripe {preview}get cus_G6GQwbr1dWXt9O
          stripe {preview}get /v1/charges --limit 50
    long: |
        With the get command, you can load API resources by providing just the resource
        id. You can also make normal HTTP {verb_upper} requests to the Stripe API by providing
        the API path.
        {preview_note}
        For a full list of supported paths, see the API reference:
        https://stripe.com/docs/api
    preview_note: |4
        The preview Stripe-Version header is set automatically on all requests.
    short: Retrieve resources by their ID or make {verb} requests
listen:
    errors:
        org_sandbox_unsupported: The listen command is not supported in an organization sandbox at this time.
        parse_api_base_url: failed to parse API base url
        unexpected_data_type: VisitData received unexpected type for DataElement, got {type}
    example: |-
        stripe listen
          stripe listen --events charge.captured,charge.updated \
            --forward-to localhost:3000/events
          stripe listen --thin-events v1.billing.meter.no_meter_found \
            --forward-thin-to localhost:3000/thin-events
    flags:
        connect_headers: 'A comma-separated list of custom headers to forward for Connect. Ex: "Key1:Value1, Key2:Value2"'
        events: 'A comma-separated list of specific events to listen for. For a list of all possible events, see: https://stripe.com/docs/api/events/types'
        format: |-
            Specifies the output format of webhook events
            	Acceptable values:
            		'JSON' - Output webhook events in JSON format
        forward_connect_to: 'The URL to forward Connect webhook events to (default: same as normal events)'
        forward_thin_connect_to: The URL to forward thin Connect events to
        forward_thin_to: The URL to forward thin events to
        forward_to: The URL to forward webhook events to
        headers: 'A comma-separated list of custom headers to forward. Ex: "Key1:Value1, Key2:Value2"'
        latest: 'Receive events formatted with the latest API version (default: your account''s default API version)'
        live: 'Receive live events (default: test)'
        print_json_deprecated: Please use `--format json` instead and use `jq` if you need to process the JSON in the terminal.
        print_secret: Only print the webhook signing secret and exit
        skip_update: Skip checking latest version of Stripe CLI
        skip_verify: Skip certificate verification when forwarding to HTTPS endpoints
        thin_events: A comma-separated list of thin events to listen for.
        use_configured_webhooks: Load webhook endpoint configuration from the webhooks API/dashboard
    long: |-
        The listen command watches and forwards webhook events from Stripe to your
        local machine by connecting directly to Stripe's API. You can test the latest
        API version, filter events, or even load your saved webhook endpoints from your
        Stripe account.
    output:
        failed_to_post: |
            {time}            [{status}] Failed to POST: {error}
        failed_to_read_response: |
            {time}            [{status}] Failed to read response from endpoint, error = {error}
        getting_ready: Getting ready...
        ready: Ready! {api_version}Your webhook signing secret is {secret} (^C to quit)
        session_expired: Session expired, reconnecting...
    short: Listen for webhook events
login:
    example: |
        # Standard browser login (default for TTY users)
          stripe login

          # Paste an API key instead of using a browser
          stripe login --interactive

          # Non-interactive: get links and exit (useful for agents/scripts)
          stripe login --non-interactive

          # Two-step agent-driven flow:
          #   Step 1 – get the browser URL, verification code, and poll URL
          stripe login --non-interactive
          #   Step 2 – after the user approves in the browser, complete login
          stripe login --complete 'https://dashboard.stripe.com/stripecli/auth/...'
    flags:
        complete: Complete a browser login by polling the given URL (from 'stripe login --non-interactive')
        interactive: Run interactive configuration mode if you cannot open a browser
        non_interactive: Print login URL and verification code as JSON and exit; immediately run the next_step command from the output to poll while the user approves in the browser
    list:
        example: stripe login list
        short: Lists all available logged-in accounts
    long: |
        Login to your Stripe account to set up the CLI.

        By default (when stdin is a terminal), this opens a browser-based OAuth flow: it
        prints a pairing code, launches your browser to the Stripe Dashboard, and waits for
        you to approve the request before saving your credentials.

        Use --interactive when a browser is unavailable:

          --interactive
              Prompts you to paste an API key directly. Useful for SSH sessions or
              CI environments with a human operator.

        For agents and scripts, use the two-step non-interactive flow:

          --non-interactive
              Prints a JSON object containing a browser_url, a verification_code to
              confirm the pairing, and a next_step command, then exits immediately.
              Activates automatically when stdin is not a terminal.
              Immediately run the next_step command from the JSON output to poll
              while the user approves in the browser; it blocks until authentication
              completes.

          --complete <poll-url>
              Polls the given URL (from the next_step of a prior --non-interactive run)
              until the user approves in the browser, then saves credentials.
    short: Login to your Stripe account
    switch:
        example: stripe login switch <account_name>
        short: Switch to a different logged-in account
login_flow:
    interactive:
        api_key_display: |
            Your API key is: {key}
        api_key_required: API key is required, please provide your API key
        error_verifying: |
            > Error verifying the CLI was setup successfully: {error}
        prompt_api_key: 'Enter your API key: '
        prompt_device_name: 'How would you like to identify this device in the Stripe Dashboard? [default: {default}] '
    output:
        browser_failed: Failed to open browser, please go to {url} manually.
        error_verifying: |
            > Error verifying the CLI was set up successfully: {error}
        go_to_url: |
            To authenticate with Stripe, please go to: {url}
        key_expiry_notice: 'Please note: this key will expire after 90 days, at which point you''ll need to re-authenticate.'
        pairing_code: |
            Your pairing code is: {code}
        pairing_code_note: This pairing code verifies your authentication with Stripe.
        press_enter_to_open: Press Enter to open the browser or visit {url} (^C to quit)
        success: |
            > {message}
        waiting_for_confirmation: Waiting for confirmation...
    poll:
        error_verifying: |
            > Error verifying setup: {error}
        next_step_cmd: stripe login --complete '{url}'
    success:
        basic: Done! The Stripe CLI is configured
        with_account: Done! The Stripe CLI is configured for your account with account id {account_id}
        with_display_and_account: Done! The Stripe CLI is configured for {display_name} with account id {account_id}
logout:
    flags:
        all: Clear credentials for all projects you are currently logged into.
    long: Logout of your Stripe account from the CLI
    short: Logout of your Stripe account
logs:
    long: Tail Stripe API request logs in real-time and see debug information.
    short: Interact with Stripe API request logs
open:
    errors:
        unsupported_command: 'unsupported open command, given: {command}'
    example: |-
        stripe open --list
          stripe open api
          stripe open docs
          stripe open dashboard/webhooks
          stripe open dashboard/billing --live
    flags:
        list: List all supported short cuts
        live: Open the Stripe Dashboard for your live integration
    long: |-
        The open command provices shortcuts to quickly let you open pages to Stripe with
        in your browser. A full list of support shortcuts can be seen with 'stripe open --list'
    output:
        column_shortcut: shortcut
        column_url: url
        intro: open quickly opens Stripe pages. To use, run 'stripe open <shortcut>'.
        shortcuts_header: 'open supports the following shortcuts:'
    short: Quickly open Stripe pages
plugin:
