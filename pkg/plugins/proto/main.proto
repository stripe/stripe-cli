syntax = "proto3";
package proto;

option go_package = "github.com/stripe/stripe-cli/plugins/proto";

service Main {
  rpc RunCommand(RunCommandRequest) returns (RunCommandResponse);
}

message RunCommandRequest {
  AdditionalInfo additional_info = 1;
  repeated string args = 2;
  uint32 core_cli_helper_id = 3;
}

message RunCommandResponse {
}

message AdditionalInfo {
  IsTerminal is_terminal = 1;
  TerminalDimensions terminal_dimensions = 2;
}

message IsTerminal {
  bool stdin = 1;
  bool stdout = 2;
  bool stderr = 3;
}

message TerminalDimensions {
  uint32 width = 1;
  uint32 height = 2;
}

service CoreCLIHelper {
  rpc Echo(EchoRequest) returns (EchoResponse);
  rpc SendAnalytics(SendAnalyticsRequest) returns (SendAnalyticsResponse);
  rpc KeychainGetPassword(KeychainGetPasswordRequest) returns (KeychainGetPasswordResponse);
  rpc KeychainSetPassword(KeychainSetPasswordRequest) returns (KeychainSetPasswordResponse);
  rpc KeychainDeletePassword(KeychainDeletePasswordRequest) returns (KeychainDeletePasswordResponse);
  rpc KeychainFindCredentials(KeychainFindCredentialsRequest) returns (KeychainFindCredentialsResponse);
  rpc RunPeerPlugin(RunPeerPluginRequest) returns (RunPeerPluginResponse);

  // Centralized UI Rendering (Milestone 1+2)
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc SendCommandOutput(SendCommandOutputRequest) returns (SendCommandOutputResponse);
  rpc SendProgress(SendProgressRequest) returns (SendProgressResponse);
  rpc Prompt(PromptRequest) returns (PromptResponse);
}

message EchoRequest {
  string input = 1;
}

message EchoResponse {
  string output = 1;
}

message SendAnalyticsRequest {
  string event_name = 1;
  string event_value = 2;
}

message SendAnalyticsResponse {
}

message KeychainGetPasswordRequest {
  string key = 1;
}

message KeychainGetPasswordResponse {
  string value = 1;
  bool found = 2;
}

message KeychainSetPasswordRequest {
  string key = 1;
  string value = 2;
}

message KeychainSetPasswordResponse {
}

message KeychainDeletePasswordRequest {
  string key = 1;
}

message KeychainDeletePasswordResponse {
  bool deleted = 1;
}

message KeychainFindCredentialsRequest {
}

message KeychainFindCredentialsResponse {
  repeated string keys = 1;
}

message RunPeerPluginRequest {
  string plugin_name = 1;
  repeated string args = 2;
  string cwd = 3;
}

message RunPeerPluginResponse {
}

// --- Centralized UI Rendering messages ---

enum MessageLevel {
  INFO = 0;
  SUCCESS = 1;
  WARNING = 2;
  ERROR = 3;
}

enum ProgressType {
  PROGRESS_INFO = 0;
  STEP = 1;
  SPINNER_START = 2;
  SPINNER_UPDATE = 3;
  SPINNER_STOP = 4;
}

enum PromptType {
  TEXT = 0;
  CONFIRM = 1;
  SELECT = 2;
}

message SendMessageRequest {
  string message = 1;
  MessageLevel level = 2;
  // Future (milestone 4): string key = 3; map<string, string> args = 4;
}

message SendMessageResponse {
}

message OutputBlock {
  string type = 1;               // "data", "warning", "nextstep", "error"
  string payload = 2;            // JSON-encoded payload (shape varies per type)
}

message SendCommandOutputRequest {
  bool ok = 1;
  string command = 2;
  repeated OutputBlock blocks = 3;
}

message SendCommandOutputResponse {
}

message SendProgressRequest {
  string id = 1;               // caller-generated, supports concurrent spinners
  string message = 2;
  ProgressType type = 3;
  bool success = 4;            // relevant on SPINNER_STOP only
}

message SendProgressResponse {
}

message PromptRequest {
  string message = 1;
  PromptType type = 2;
  repeated string options = 3;   // required for SELECT
  string default_value = 4;
}

message PromptResponse {
  string value = 1;              // "true"/"false" for CONFIRM, selected value for SELECT
}
