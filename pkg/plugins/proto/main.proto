syntax = "proto3";
package proto;

option go_package = "github.com/stripe/stripe-cli/plugins/proto";

service Main {
  rpc RunCommand(RunCommandRequest) returns (RunCommandResponse);
}

message RunCommandRequest {
  AdditionalInfo additional_info = 1;
  repeated string args = 2;
  uint32 core_cli_helper_id = 3;
}

message RunCommandResponse {
}

message AdditionalInfo {
  IsTerminal is_terminal = 1;
  TerminalDimensions terminal_dimensions = 2;
}

message IsTerminal {
  bool stdin = 1;
  bool stdout = 2;
  bool stderr = 3;
}

message TerminalDimensions {
  uint32 width = 1;
  uint32 height = 2;
}

service CoreCLIHelper {
  rpc Echo(EchoRequest) returns (EchoResponse);
  rpc SendAnalytics(SendAnalyticsRequest) returns (SendAnalyticsResponse);
  rpc KeychainGetPassword(KeychainGetPasswordRequest) returns (KeychainGetPasswordResponse);
  rpc KeychainSetPassword(KeychainSetPasswordRequest) returns (KeychainSetPasswordResponse);
  rpc KeychainDeletePassword(KeychainDeletePasswordRequest) returns (KeychainDeletePasswordResponse);
  rpc KeychainFindCredentials(KeychainFindCredentialsRequest) returns (KeychainFindCredentialsResponse);
}

message EchoRequest {
  string input = 1;
}

message EchoResponse {
  string output = 1;
}

message SendAnalyticsRequest {
  string event_name = 1;
  string event_value = 2;
}

message SendAnalyticsResponse {
}

message KeychainGetPasswordRequest {
  string key = 1;
}

message KeychainGetPasswordResponse {
  string value = 1;
  bool found = 2;
}

message KeychainSetPasswordRequest {
  string key = 1;
  string value = 2;
}

message KeychainSetPasswordResponse {
}

message KeychainDeletePasswordRequest {
  string key = 1;
}

message KeychainDeletePasswordResponse {
  bool deleted = 1;
}

message KeychainFindCredentialsRequest {
}

message KeychainFindCredentialsResponse {
  repeated string keys = 1;
}
