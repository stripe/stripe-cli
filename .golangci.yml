version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - gocritic
    - gocyclo
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          allow:
            - $all
          deny: []
    govet:
      disable:
        - printf
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
        - -SA1006
        - -SA1019
        - -ST1000
        - -ST1003
        - -ST1005
        - -ST1016
        - -ST1019
        - -ST1020
        - -ST1012
        - -QF1002
        - -QF1003
        - -QF1008
        - -QF1012
  exclusions:
    presets: []
    rules:
      - path: _test\.go
        linters:
          - dupl
      - path: resources_cmds\.go
        linters:
          - dupl
    max-issues-per-linter: 0
    max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/stripe/stripe-cli
