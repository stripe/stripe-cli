version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - gocritic
    - gocyclo
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          allow:
            - $all
          deny: []
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
  exclusions:
    presets: []
    rules:
      - path: _test\.go
        linters:
          - dupl
      - path: resources_cmds\.go
        linters:
          - dupl

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/stripe/stripe-cli
