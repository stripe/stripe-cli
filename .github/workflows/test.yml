on: [push, pull_request]
name: Test
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        go-version: [1.26.0]
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    # Windows throws false positives with linting because of CRLF / goimports incompat
    - name: Set git to use LF
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run Setup
      run: make setup
    - name: install diffutils
      if: runner.os == 'macOS'
      run: brew install diffutils
    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        version: '28.3'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install protoc deps
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
        go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@v1.5.1
      shell: bash
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.10.1
        args: --max-issues-per-linter=0 --max-same-issues=0
    - name: Run Tests
      run: make ci
      shell: bash
      env:
        # Work around Go 1.26.0 linker crash on darwin/arm64 with -race (https://github.com/golang/go/issues/77593)
        CGO_ENABLED: ${{ runner.os == 'macOS' && '0' || '1' }}
