on:
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Skip PagerDuty alert on failure'
        type: boolean
        default: true
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
name: Package manager test
permissions:
  contents: read
jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-test.sh
          sparse-checkout-cone-mode: false
      - run: bash scripts/install-test.sh homebrew
  homebrew-core:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-test.sh
          sparse-checkout-cone-mode: false
      - run: bash scripts/install-test.sh homebrew-core
  apt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-test.sh
          sparse-checkout-cone-mode: false
      - run: bash scripts/install-test.sh apt
  yum:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - run: |
          if [ ! -d "/etc/yum.repos.d" ]; then
              sudo mkdir /etc/yum.repos.d
          fi
              echo "[Stripe]
          name=stripe
          baseurl=https://packages.stripe.dev/stripe-cli-rpm-local/
          enabled=1
          gpgcheck=0" | sudo tee /etc/yum.repos.d/stripe.repo

      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-test.sh
          sparse-checkout-cone-mode: false
      - run: bash scripts/install-test.sh yum
  scoop:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          scripts/install-test.sh
        sparse-checkout-cone-mode: false
    - uses: MinoruSekine/setup-scoop@v4
    - shell: powershell
      run: bash scripts/install-test.sh scoop
  winget:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          scripts/install-test.sh
        sparse-checkout-cone-mode: false
    - shell: powershell
      run: bash scripts/install-test.sh winget
  docker:
    runs-on: ubuntu-latest
    container: stripe/stripe-cli:latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-test.sh
          sparse-checkout-cone-mode: false
      - run: sh scripts/install-test.sh docker

  npm:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-test.sh
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: bash scripts/install-test.sh npm

  npm-no-optional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-test.sh
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: bash scripts/install-test.sh npm-no-optional

  npx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install-test.sh
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      # npm 10 has a bug where conflicting bin entries across a package and its
      # optional dependency silently drop the bin link, causing "stripe: not found".
      - run: npm install -g npm@11
      - run: bash scripts/install-test.sh npx

  notify:
    runs-on: ubuntu-latest
    needs: [homebrew, homebrew-core, apt, yum, scoop, winget, docker, npm, npm-no-optional, npx]
    if: always()
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/notify.sh
          sparse-checkout-cone-mode: false
      - run: bash scripts/notify.sh
        env:
          OVERALL_RESULT: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
          PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          DRYRUN: ${{ inputs.dryrun }}
