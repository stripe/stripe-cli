on:
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Skip PagerDuty alert on failure'
        type: boolean
        default: true
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
name: Curl install test
permissions:
  contents: read
jobs:
  curl-install-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install.sh
          sparse-checkout-cone-mode: false
      - run: |
          sh scripts/install.sh
          export PATH="$HOME/.stripe/bin:$PATH"
          stripe --version

  curl-install-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/install.sh
          sparse-checkout-cone-mode: false
      - run: |
          sh scripts/install.sh
          export PATH="$HOME/.stripe/bin:$PATH"
          stripe --version

  notify:
    runs-on: ubuntu-latest
    needs: [curl-install-macos, curl-install-linux]
    if: always()
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/notify.sh
          sparse-checkout-cone-mode: false
      - run: bash scripts/notify.sh
        env:
          OVERALL_RESULT: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
          PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          DRYRUN: ${{ inputs.dryrun }}
