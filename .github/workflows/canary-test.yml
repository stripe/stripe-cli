name: Canary Tests

on:
  push:
    branches: [master]
  workflow_call:
    inputs:
      run_api_tests:
        description: 'Run API tests (requires secrets)'
        required: false
        default: true
        type: boolean
    secrets:
      STRIPE_TEST_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      run_api_tests:
        description: 'Run API tests (requires secrets)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  canary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: stripe
          - os: macos-latest
            binary: stripe
          - os: windows-latest
            binary: stripe.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Build binary (production-like)
        run: |
          go generate ./...
          CGO_ENABLED=0 go build -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/stripe
        shell: bash

      - name: Run offline canary tests
        run: go test -v -timeout 10m ./canary/... -run "TestOffline"
        shell: bash
        env:
          STRIPE_CLI_BINARY: ${{ github.workspace }}/${{ matrix.binary }}
          STRIPE_CLI_TELEMETRY_OPTOUT: "1"

      - name: Run API canary tests
        # Run API tests when:
        # 1. On push to master (secrets available)
        # 2. On manual workflow_dispatch with run_api_tests=true
        # 3. When called from another workflow (e.g. release)
        if: |
          secrets.STRIPE_TEST_API_KEY != '' &&
          (github.event_name == 'push' ||
           github.event_name == 'workflow_dispatch' ||
           github.event_name == 'workflow_call')
        run: go test -v -timeout 15m ./canary/... -run "TestAPI"
        shell: bash
        env:
          STRIPE_CLI_BINARY: ${{ github.workspace }}/${{ matrix.binary }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
          STRIPE_CLI_TELEMETRY_OPTOUT: "1"
