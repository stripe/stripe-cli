name: Canary Tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  canary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: stripe
          - os: macos-latest
            binary: stripe
          - os: windows-latest
            binary: stripe.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Build binary
        run: go build -o ${{ matrix.binary }} ./cmd/stripe
        shell: bash

      - name: Run offline canary tests
        run: go test -v -timeout 10m ./canary/... -run "TestOffline"
        shell: bash
        env:
          STRIPE_CLI_BINARY: ${{ github.workspace }}/${{ matrix.binary }}
          STRIPE_CLI_TELEMETRY_OPTOUT: "1"

      - name: Run API canary tests
        if: ${{ secrets.STRIPE_TEST_API_KEY != '' }}
        run: go test -v -timeout 15m ./canary/... -run "TestAPI"
        shell: bash
        env:
          STRIPE_CLI_BINARY: ${{ github.workspace }}/${{ matrix.binary }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
          STRIPE_CLI_TELEMETRY_OPTOUT: "1"
