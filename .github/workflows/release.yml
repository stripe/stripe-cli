name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # Required for OIDC to npm

jobs:
  canary-tests:
    uses: ./.github/workflows/canary-test.yml
    with:
      run_api_tests: true
    secrets:
      STRIPE_TEST_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}

  build-mac:
    needs: [canary-tests]
    runs-on: macos-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.0
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release -f .goreleaser/mac.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}

  build-linux:
    needs: [canary-tests]
    runs-on: ubuntu-22.04
    env:
      # https://goreleaser.com/customization/docker_manifest/
      DOCKER_CLI_EXPERIMENTAL: "enabled"

    steps:
      - name: Code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      -
        name: Docker Login
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${DOCKER_PASSWORD}" | docker login --username "${DOCKER_USERNAME}" --password-stdin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.0
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release -f .goreleaser/linux.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACTORY_SECRET: ${{ secrets.ARTIFACTORY_SECRET }}

  build-windows:
    needs: [canary-tests]
    runs-on: windows-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.0
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release -f .goreleaser/windows.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}

  upload-to-virustotal:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v6
      - name: Upload to VirusTotal
        run: scripts/upload-zip-to-virustotal.sh
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}

  publish-npm:
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download and extract platform binaries from GitHub Release
        run: node npm/scripts/fetch-binaries.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}

      - name: Stamp version into all package.json files
        run: node npm/scripts/stamp-version.js ${{ env.VERSION }}

      - name: Copy README into each package
        run: |
          for dir in wrapper darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            cp README.md npm/$dir/README.md
          done

      - name: Publish platform packages
        run: |
          for dir in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            NODE_AUTH_TOKEN="" npm publish ./npm/$dir --access public
          done

      - name: Publish wrapper package
        run: NODE_AUTH_TOKEN="" npm publish ./npm/wrapper --access public
