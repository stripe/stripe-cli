name: Plugin Canary Tests

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Skip PagerDuty alert on failure'
        type: boolean
        default: true

permissions:
  contents: read

env:
  RECENT_VERSIONS_TO_TEST: 10

jobs:
  plugin-canary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Install Stripe CLI
        uses: stripe/stripe-cli-ts-plugin-bootstrap/.github/actions/install-stripe-cli@v0.5.4

      - name: Verify CLI installed
        run: stripe version
        shell: bash

      - name: Checkout notify script
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/notify.sh
          sparse-checkout-cone-mode: false

      - name: Install and test recent projects plugin versions
        shell: bash
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
          PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DRYRUN: ${{ inputs.dryrun }}
        run: |
          set -uo pipefail

          # Fetch the plugin manifest and extract recent versions
          VERSIONS=$(curl -fsSL "https://stripe.jfrog.io/artifactory/stripe-cli-plugins-local/plugins.toml" \
            | awk '/Shortname = "projects"/,/^\[\[Plugin\]\]/' \
            | grep 'Version = ' \
            | sed 's/.*Version = "\(.*\)"/\1/' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | uniq \
            | tail -n "$RECENT_VERSIONS_TO_TEST")

          echo "Testing versions:"
          echo "$VERSIONS"
          echo ""

          FAILURES=0

          while IFS= read -r VERSION; do
            echo "=== Testing projects@${VERSION} ==="

            if stripe plugin install "projects@${VERSION}" && \
               stripe projects --help && \
               stripe projects catalog; then
              echo "=== projects@${VERSION} PASSED ==="

              PAGERDUTY_DEDUP_KEY="plugin-canary-projects-${VERSION}" \
              PAGERDUTY_SUMMARY="Plugin canary: projects@${VERSION} failed. Investigate: ${GH_RUN_URL}" \
              PAGERDUTY_RESOLVE_SUMMARY="Plugin canary: projects@${VERSION} is passing again" \
              PAGERDUTY_SEVERITY="warning" \
              DRYRUN="${DRYRUN}" \
              OVERALL_RESULT="success" \
              bash scripts/notify.sh
            else
              echo "=== projects@${VERSION} FAILED ==="
              FAILURES=$((FAILURES + 1))

              PAGERDUTY_DEDUP_KEY="plugin-canary-projects-${VERSION}" \
              PAGERDUTY_SUMMARY="Plugin canary: projects@${VERSION} failed. Investigate: ${GH_RUN_URL}" \
              PAGERDUTY_RESOLVE_SUMMARY="Plugin canary: projects@${VERSION} is passing again" \
              PAGERDUTY_SEVERITY="warning" \
              DRYRUN="${DRYRUN}" \
              OVERALL_RESULT="failure" \
              bash scripts/notify.sh
            fi

            echo ""
          done <<< "$VERSIONS"

          if [ "$FAILURES" -gt 0 ]; then
            echo "$FAILURES version(s) failed"
            exit 1
          fi
