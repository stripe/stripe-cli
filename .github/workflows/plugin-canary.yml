name: Plugin Canary Tests

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin to test (default: projects)'
        required: false
        default: 'projects'

permissions:
  contents: read

jobs:
  plugin-canary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: stripe
          - os: macos-latest
            binary: stripe
          - os: windows-latest
            binary: stripe.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'

      - name: Build binary
        run: |
          go generate ./...
          CGO_ENABLED=0 go build -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/stripe
        shell: bash

      - name: Run plugin canary tests
        run: go test -v -timeout 15m ./canary/... -run "TestAPIProjects"
        shell: bash
        env:
          STRIPE_CLI_BINARY: ${{ github.workspace }}/${{ matrix.binary }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
          STRIPE_CLI_TELEMETRY_OPTOUT: "1"

      # TODO: Add alerting once tests are proven stable
      # - name: Alert on failure
      #   if: failure() && github.event_name == 'schedule'
      #   run: |
      #     curl -X POST "${{ secrets.PLUGIN_CANARY_SLACK_WEBHOOK_URL }}" \
      #       -H 'Content-Type: application/json' \
      #       -d "{\"text\": \"🚨 Plugin canary tests failed on ${{ matrix.os }}. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
