on:
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Skip PagerDuty alert on failure'
        type: boolean
        default: true
name: Auto-upgrade test
permissions:
  contents: read
jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.versions.outputs.latest }}
    steps:
      - name: Fetch latest release version
        id: versions
        run: |
          for i in 1 2 3; do
            LATEST=$(curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/stripe/stripe-cli/releases/latest" | \
              sed -n 's/.*"tag_name": *"v\([^"]*\)".*/\1/p')
            if [ -n "$LATEST" ]; then
              echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
              echo "Latest: $LATEST"
              exit 0
            fi
            echo "Attempt $i: failed to fetch version, retrying in 10s..."
            sleep 10
          done
          echo "Error: could not determine latest version after 3 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upgrade-macos:
    runs-on: macos-latest
    needs: [resolve-versions]
    outputs:
      failed_step: ${{ steps.result.outputs.failed_step }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'

      - name: Build binary with fake old version
        id: build
        env:
          STRIPE_NO_AUTO_UPDATE: "1"
        run: |
          go generate ./...
          CGO_ENABLED=0 go build -ldflags="-s -w -X github.com/stripe/stripe-cli/pkg/version.Version=1.0.0" \
            -o "$HOME/.stripe/bin/stripe" ./cmd/stripe
          chmod +x "$HOME/.stripe/bin/stripe"
          export PATH="$HOME/.stripe/bin:$PATH"
          INSTALLED=$(stripe --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$INSTALLED" != "1.0.0" ]; then
            echo "Error: expected version 1.0.0, got $INSTALLED"
            exit 1
          fi
          echo "Built binary with version v$INSTALLED"

      - name: Stage update marker
        id: update-check
        run: |
          LATEST="${{ needs.resolve-versions.outputs.latest }}"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH_NAME="x86_64" ;;
            arm64|aarch64) ARCH_NAME="arm64" ;;
            *) ARCH_NAME="$ARCH" ;;
          esac
          URL="https://github.com/stripe/stripe-cli/releases/download/v${LATEST}/stripe_${LATEST}_mac-os_${ARCH_NAME}.tar.gz"

          mkdir -p "$HOME/.stripe/state"
          printf '%s\n%s\n%s\n' "$LATEST" "$URL" "" > "$HOME/.stripe/state/update-available"
          echo "Wrote update marker:"
          cat "$HOME/.stripe/state/update-available"

      - name: Verify auto-upgrade
        id: upgrade
        env:
          STRIPE_INSTALL_METHOD: curl
        run: |
          export PATH="$HOME/.stripe/bin:$PATH"
          OUTPUT=$(stripe --version 2>&1)
          echo "$OUTPUT"
          UPGRADED=$(echo "$OUTPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
          if [ "$UPGRADED" != "${{ needs.resolve-versions.outputs.latest }}" ]; then
            echo "Error: expected upgrade to v${{ needs.resolve-versions.outputs.latest }}, got v$UPGRADED"
            exit 1
          fi
          echo "Successfully upgraded to v$UPGRADED"

      - name: Record failed step
        id: result
        if: failure()
        run: |
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo "failed_step=build" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.update-check.outcome }}" = "failure" ]; then
            echo "failed_step=update-check" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.upgrade.outcome }}" = "failure" ]; then
            echo "failed_step=auto-upgrade" >> "$GITHUB_OUTPUT"
          fi

  upgrade-linux:
    runs-on: ubuntu-latest
    needs: [resolve-versions]
    outputs:
      failed_step: ${{ steps.result.outputs.failed_step }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'

      - name: Build binary with fake old version
        id: build
        env:
          STRIPE_NO_AUTO_UPDATE: "1"
        run: |
          go generate ./...
          CGO_ENABLED=0 go build -ldflags="-s -w -X github.com/stripe/stripe-cli/pkg/version.Version=1.0.0" \
            -o "$HOME/.stripe/bin/stripe" ./cmd/stripe
          chmod +x "$HOME/.stripe/bin/stripe"
          export PATH="$HOME/.stripe/bin:$PATH"
          INSTALLED=$(stripe --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$INSTALLED" != "1.0.0" ]; then
            echo "Error: expected version 1.0.0, got $INSTALLED"
            exit 1
          fi
          echo "Built binary with version v$INSTALLED"

      - name: Stage update marker
        id: update-check
        run: |
          LATEST="${{ needs.resolve-versions.outputs.latest }}"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH_NAME="x86_64" ;;
            arm64|aarch64) ARCH_NAME="arm64" ;;
            *) ARCH_NAME="$ARCH" ;;
          esac
          URL="https://github.com/stripe/stripe-cli/releases/download/v${LATEST}/stripe_${LATEST}_linux_${ARCH_NAME}.tar.gz"

          mkdir -p "$HOME/.stripe/state"
          printf '%s\n%s\n%s\n' "$LATEST" "$URL" "" > "$HOME/.stripe/state/update-available"
          echo "Wrote update marker:"
          cat "$HOME/.stripe/state/update-available"

      - name: Verify auto-upgrade
        id: upgrade
        env:
          STRIPE_INSTALL_METHOD: curl
        run: |
          export PATH="$HOME/.stripe/bin:$PATH"
          OUTPUT=$(stripe --version 2>&1)
          echo "$OUTPUT"
          UPGRADED=$(echo "$OUTPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
          if [ "$UPGRADED" != "${{ needs.resolve-versions.outputs.latest }}" ]; then
            echo "Error: expected upgrade to v${{ needs.resolve-versions.outputs.latest }}, got v$UPGRADED"
            exit 1
          fi
          echo "Successfully upgraded to v$UPGRADED"

      - name: Record failed step
        id: result
        if: failure()
        run: |
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo "failed_step=build" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.update-check.outcome }}" = "failure" ]; then
            echo "failed_step=update-check" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.upgrade.outcome }}" = "failure" ]; then
            echo "failed_step=auto-upgrade" >> "$GITHUB_OUTPUT"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [resolve-versions, upgrade-macos, upgrade-linux]
    if: always()
    steps:
      - uses: actions/checkout@v6
        if: needs.resolve-versions.result == 'success' && contains(needs.*.result, 'failure')
        with:
          sparse-checkout: |
            scripts/notify.sh
          sparse-checkout-cone-mode: false

      - name: Build failure summary
        id: summary
        if: needs.resolve-versions.result == 'success' && contains(needs.*.result, 'failure')
        run: |
          MACOS_STEP="${{ needs.upgrade-macos.outputs.failed_step }}"
          LINUX_STEP="${{ needs.upgrade-linux.outputs.failed_step }}"

          MSG=""
          if [ -n "$MACOS_STEP" ] && [ -n "$LINUX_STEP" ]; then
            if [ "$MACOS_STEP" = "$LINUX_STEP" ]; then
              MSG="Step '${MACOS_STEP}' failed on macOS and Linux"
            else
              MSG="Step '${MACOS_STEP}' failed on macOS, step '${LINUX_STEP}' failed on Linux"
            fi
          elif [ -n "$MACOS_STEP" ]; then
            MSG="Step '${MACOS_STEP}' failed on macOS"
          elif [ -n "$LINUX_STEP" ]; then
            MSG="Step '${LINUX_STEP}' failed on Linux"
          else
            MSG="Unknown failure"
          fi

          echo "msg=$MSG" >> "$GITHUB_OUTPUT"

      - name: Trigger PagerDuty alert
        if: needs.resolve-versions.result == 'success' && contains(needs.*.result, 'failure')
        run: bash scripts/notify.sh
        env:
          OVERALL_RESULT: failure
          PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          PAGERDUTY_DEDUP_KEY: gh-actions-stripe-cli-autoupgrade-test
          PAGERDUTY_SUMMARY: "Auto-upgrade test failed: ${{ steps.summary.outputs.msg }}. Investigate: https://github.com/stripe/stripe-cli/actions/workflows/autoupgrade-test.yml"
          PAGERDUTY_RESOLVE_SUMMARY: "Auto-upgrade test is passing again"
          PAGERDUTY_SEVERITY: critical
          DRYRUN: "true" # TODO: switch to ${{ inputs.dryrun }} once confirmed stable

      - name: Resolve PagerDuty alert
        if: needs.upgrade-macos.result == 'success' && needs.upgrade-linux.result == 'success'
        run: bash scripts/notify.sh
        env:
          OVERALL_RESULT: success
          PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          PAGERDUTY_DEDUP_KEY: gh-actions-stripe-cli-autoupgrade-test
          PAGERDUTY_SUMMARY: "unused"
          PAGERDUTY_RESOLVE_SUMMARY: "Auto-upgrade test is passing again"
          PAGERDUTY_SEVERITY: critical
          DRYRUN: "true" # TODO: switch to ${{ inputs.dryrun }} once confirmed stable

      - name: Skip notification (setup failure)
        if: needs.resolve-versions.result == 'failure'
        run: echo "Setup job (version resolution) failed — likely transient GitHub API issue. Skipping PagerDuty alert."
