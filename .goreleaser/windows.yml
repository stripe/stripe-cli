version: 2
env:
  - GO111MODULE=on
before:
  hooks:
    - go mod download
    - go generate ./...
project_name: stripe
builds:
  - id: stripe-windows
    ldflags:
      - -s -w -X github.com/stripe/stripe-cli/pkg/version.Version={{.Version}}
    binary: stripe
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    main: ./cmd/stripe/main.go
    goos:
      - windows
    goarch:
      - amd64
      - 386
archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "386" }}i386
      {{- else if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - none*
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
checksum:
  name_template: "{{ .ProjectName }}-windows-checksums.txt"
snapshot:
  version_template: "{{ .Version }}-next"
scoops:
  - repository:
      owner: stripe
      name: scoop-stripe-cli
      token: "{{ .Env.GORELEASER_GITHUB_TOKEN }}" # This token can access the repo, but GITHUB_TOKEN cannot
    commit_author:
      name: stripe-ci
      email: support@stripe.com
    homepage: https://stripe.com
    description: Stripe CLI utility
    license: Apache 2.0
winget:
  - name: stripe
    publisher: "Stripe, Inc."
    short_description: "Stripe CLI utility"
    license: "Apache-2.0"
    publisher_url: https://stripe.com
    homepage: https://stripe.com
    package_identifier: Stripe.StripeCLI
    repository:
      owner: stripe
      name: winget-pkgs
      branch: "stripe-cli-{{.Version}}"
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_author:
      name: stripe-ci
      email: support@stripe.com
